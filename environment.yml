name: lcd-v2-data

channels:
  - conda-forge

dependencies:
  # Python
  - python>=3.11,<=3.12.9
  - pip
  - mamba

  # Build tooling
  - setuptools>=77
  - wheel

  # Runtime dependencies
  - geopandas
  - matplotlib
  - numpy
  - netcdf4
  - pandas
  - requests
  - shapely
  - timezonefinder
  - xarray

  # Jupyter support
  - jupyter_client
  - jupyter_core
  - notebook
  - ipykernel

  # Development tooling, kept here because setup-dev-env.sh installs .[dev] with --no-deps.
  - pytest
  - pytest-cov
  - mypy
  - ruff
  - pre-commit
